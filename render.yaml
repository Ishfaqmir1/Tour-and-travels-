services:
  - type: web_service
    name: the-viceroy-tour-and-travels-backend
    env: node
    region: oregon
    plan: free
    branch: main
    root: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '8080'
      - key: DATABASE_URL
        value: 'postgresql://...' # Your Neon PostgreSQL connection string
      - key: JWT_SECRET
        value: 'viceroy-jwt-secret-key-2026'
      - key: SUPER_ADMIN_EMAIL
        value: 'admin@viceroytravels.com'
      - key: SUPER_ADMIN_PASSWORD
        value: '<your-admin-password>'
      - key: FRONTEND_URL
        value: 'https://<YOUR-VERCEL-APP>.vercel.app'
